<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu - Hanish Tiffin Center</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

/* Header */
header{
background:#ff7043;
color:white;
text-align:center;
padding:15px;
}

/* Navigation */
nav{
background:#333;
text-align:center;
}

nav a{
color:white;
padding:14px 20px;
display:inline-block;
text-decoration:none;
}

nav a:hover{
background:#ff7043;
}

/* Menu Grid */
.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:40px;
}

/* Card */
.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
text-align:center;
transition: transform 0.3s ease, box-shadow 0.3s ease;
}

/* Card Hover Animation */
.card:hover{
transform: translateY(-10px) scale(1.05);
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

/* Image */
.card img{
width:100%;
height:80%;
border-radius:10px;
transition: transform 0.3s ease;
}

/* Image Zoom */
.card:hover img{
transform:scale(1.1);
}

/* Footer */
footer{
background:#333;
color:white;
text-align:center;
padding:10px;
}

/* Tablet */
@media (max-width:768px){

nav a{
display:block;
padding:10px;
border-bottom:1px solid #555;
}

.menu{
grid-template-columns:1fr;
padding:20px;
}

.card img{
height:auto;
}

h1{
font-size:22px;
}

h2{
font-size:20px;
}

}

/* Mobile */
@media (max-width:480px){

header{
padding:10px;
}

nav a{
font-size:14px;
}

.card{
padding:10px;
}

.menu{
gap:15px;
}

}

</style>
</head>

<body>

<header>
<h1>Hanish Tiffin Center</h1>
</header>

<nav>
<a href="index.html">Home</a>
<a href="menu.html">Menu</a>
<a href="contactme.html">Contact</a>
</nav>

<h3>Dosa</h3>

</body>
</html>
